<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corito Travel </title>
</head>
<body>

    <header>
        <!-- Menú de navegación -->
        <div class="menuPrincipal">
            <figure class="logo">
                <img src="imagenes/Logo-corito.png" alt="Logo de Corito Travel" width="120px" height="80px">
            </figure>
            <nav class="menu">
                <a href="#">Inicio</a>
                <a href="#">Destinos</a>
                <a href="#">Paquetes</a>
                <a href="#">Vuelos</a>
                <a href="#">Ofertas</a>
                <a href="#">Nosotros</a>
                <a href="#" class="esquinero">Mi Perfil</a>
            </nav>
        </div>
        <!-- Información de la página -->
        <h1>Administra tu información y revisa tus viajes</h1>
        <figure>
            <img src="imagenes/Imagen-Inicio.png" alt="">
        </figure>
        
        <div class="accesoEmpleado">
            <form action="">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" required>
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" name="contrasena" required>
                <button type="submit">Iniciar Sesión</button>
            </form>
        </div>

        <div>
            <nav>
                <a href="#">Olvidaste tu contraseña?</a>
                </a>
            </nav>
        </div>

    </header>
    
</body>
</html>
